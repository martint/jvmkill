name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # jvmti.h is read at compile time from the JDK that
      # scripts/release.sh bind-mounts into the rustxc container.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Cross-compile and stage artifacts
        run: ./scripts/release.sh

      - uses: actions/upload-artifact@v7
        with:
          name: jvmkill-binaries
          path: dist/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Build and test agent
        run: make test

  release:
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: jvmkill-binaries
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$VERSION" \
            --generate-notes \
            --title "$VERSION" \
            --target "$GITHUB_SHA" \
            dist/*
